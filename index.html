  <style id="press-boot-skeleton-style">
    #press-boot-skeleton {
      --press-boot-bg: #faf7f0;
      --press-boot-surface: #fbf9f2;
      --press-boot-border: #e5decc;
      --press-boot-line: rgba(31, 31, 31, 0.1);
      min-height: 100vh;
      padding: 1.5rem;
      background: var(--press-boot-bg);
      color: transparent;
    }

    [data-theme="dark"] #press-boot-skeleton {
      --press-boot-bg: #141414;
      --press-boot-surface: #1a1a1a;
      --press-boot-border: #2a2a2a;
      --press-boot-line: rgba(232, 230, 227, 0.12);
    }

    .press-boot-shell {
      width: min(100%, 72rem);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 18rem;
      gap: 1.5rem;
      align-items: start;
    }

    .press-boot-panel {
      border: 1px solid var(--press-boot-border);
      background: var(--press-boot-surface);
      padding: 1.25rem;
      overflow: hidden;
    }

    .press-boot-line,
    .press-boot-block {
      position: relative;
      overflow: hidden;
      border-radius: 0.25rem;
      background: var(--press-boot-line);
    }

    .press-boot-line::after,
    .press-boot-block::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: press-boot-shimmer 1.2s infinite;
    }

    [data-theme="dark"] .press-boot-line::after,
    [data-theme="dark"] .press-boot-block::after {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
    }

    .press-boot-title { width: 58%; height: 2rem; margin-bottom: 1.25rem; }
    .press-boot-meta { width: 34%; height: 0.875rem; margin-bottom: 1.5rem; }
    .press-boot-copy { height: 0.95rem; margin: 0.75rem 0; }
    .press-boot-copy:nth-child(4) { width: 92%; }
    .press-boot-copy:nth-child(5) { width: 86%; }
    .press-boot-copy:nth-child(6) { width: 78%; }
    .press-boot-block { height: 11rem; margin: 1.25rem 0; }
    .press-boot-side { height: 0.9rem; margin: 0.75rem 0; }
    .press-boot-side:nth-child(1) { width: 75%; }
    .press-boot-side:nth-child(2) { width: 52%; }
    .press-boot-side:nth-child(3) { width: 66%; }
    .press-boot-side:nth-child(4) { width: 44%; }

    @keyframes press-boot-shimmer {
      100% { transform: translateX(100%); }
    }

    @media (max-width: 760px) {
      #press-boot-skeleton { padding: 1rem; }
      .press-boot-shell { grid-template-columns: 1fr; gap: 1rem; }
      .press-boot-side-panel { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .press-boot-line::after,
      .press-boot-block::after {
        animation: none;
      }
    }
  </style>
  <script src="assets/js/theme-boot.js?v=press-system-v3.4.7"></script>
  <link rel="stylesheet" id="theme-pack">
</head>
<body>

        <div class="press-boot-line press-boot-copy"></div>
        <div class="press-boot-line press-boot-copy"></div>

        <div class="press-boot-block"></div>
        <div class="press-boot-line press-boot-copy"></div>
        <div class="press-boot-line press-boot-copy"></div>
      </div>
      <div class="press-boot-panel press-boot-side-panel">

        <div class="press-boot-line press-boot-side"></div>
        <div class="press-boot-line press-boot-side"></div>
        <div class="press-boot-line press-boot-side"></div>
      </div>
    </div>
  </div>
  <script type="module" src="assets/main.js?v=press-system-v3.4.7"></script>
