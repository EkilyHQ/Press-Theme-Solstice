name: Sync Demo From Press Release

on:
  repository_dispatch:
    types:
      - press-system-release
  workflow_dispatch:
    inputs:
      tag:
        description: Press release tag to sync, for example v3.4.0. Leave empty for latest.
        required: false
  schedule:
    - cron: '43 3 * * *'

permissions:
  contents: write

concurrency:
  group: sync-demo-from-press-release
  cancel-in-progress: false

jobs:
  sync-demo:
    runs-on: ubuntu-latest
    env:
      PRESS_REPOSITORY: ${{ vars.PRESS_REPOSITORY || 'EkilyHQ/Press' }}
      INPUT_TAG: ${{ inputs.tag }}
      DISPATCH_TAG: ${{ github.event.client_payload.tag }}
      DISPATCH_ASSET_NAME: ${{ github.event.client_payload.asset_name }}
      DISPATCH_ASSET_SIZE: ${{ github.event.client_payload.asset_size }}
      DISPATCH_ASSET_SHA256: ${{ github.event.client_payload.asset_sha256 }}
      DISPATCH_RELEASE_INTENT_SOURCE: ${{ github.event.client_payload.release_intent.source }}
      PRESS_RELEASE_TOKEN: ${{ secrets.PRESS_RELEASE_TOKEN || github.token }}
      DEMO_BRANCH: demo
    steps:
      - name: Checkout theme source
        uses: actions/checkout@v6
        with:
          path: source
          fetch-depth: 0

      - name: Resolve Press release
        id: release
        working-directory: source
        env:
          GH_TOKEN: ${{ secrets.PRESS_RELEASE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          mkdir -p ../dist

          tag="${INPUT_TAG:-${DISPATCH_TAG:-}}"
          if [[ -n "${tag}" ]]; then
            gh api "repos/${PRESS_REPOSITORY}/releases/tags/${tag}" > ../dist/press-release.json
          else
            gh api "repos/${PRESS_REPOSITORY}/releases/latest" > ../dist/press-release.json
          fi

          release_tag="$(node -p "require('../dist/press-release.json').tag_name || ''")"
          payload_intent_source="${DISPATCH_RELEASE_INTENT_SOURCE:-}"
          canonical_intent_source=""
          if [[ -n "${release_tag}" ]]; then
            canonical_intent_source="https://raw.githubusercontent.com/${PRESS_REPOSITORY}/release-artifacts/${release_tag}/release-intent.json"
          fi
          if [[ -n "${payload_intent_source}" && "${payload_intent_source}" != "${canonical_intent_source}" ]]; then
            echo "dispatch release_intent.source must match ${canonical_intent_source}" >&2
            exit 1
          fi

          if [[ -n "${canonical_intent_source}" ]]; then
            if curl --fail-with-body --location --silent --show-error \
              --header "Authorization: Bearer ${PRESS_RELEASE_TOKEN}" \
              --output ../dist/release-intent.json \
              "${canonical_intent_source}"; then
              echo "Resolved Press release intent ${canonical_intent_source}."
            else
              rm -f ../dist/release-intent.json
              if [[ -n "${payload_intent_source}" ]]; then
                echo "dispatch declared a release intent, but the canonical manifest could not be fetched." >&2
                exit 1
              fi
              canonical_system_release_source="https://raw.githubusercontent.com/${PRESS_REPOSITORY}/release-artifacts/${release_tag}/system-release.json"
              if curl --fail-with-body --location --silent --show-error \
                --header "Authorization: Bearer ${PRESS_RELEASE_TOKEN}" \
                --output ../dist/system-release.json \
                "${canonical_system_release_source}"; then
                if node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync('../dist/system-release.json','utf8')); process.exit(m.intent && m.intent.url ? 0 : 1);"; then
                  echo "system-release.json declares release intent, but the canonical manifest could not be fetched." >&2
                  exit 1
                fi
              fi
              echo "No canonical release intent manifest available for ${release_tag}; using legacy release metadata."
            fi
          fi

          PRESS_TARGET_REPOSITORY="${GITHUB_REPOSITORY}" \
          PRESS_RELEASE_TARGET_CATEGORY="themeDemo" \
          PRESS_RELEASE_TARGET_REF="demo" \
          PRESS_RELEASE_TARGET_PATH="assets/press-system.json" \
          PRESS_RELEASE_TARGET_TYPE="press-system-manifest" \
          PRESS_RELEASE_TARGET_RECONCILER="theme-demo-runtime-sync" \
          node scripts/resolve-press-system-release.js \
            --release ../dist/press-release.json \
            --release-intent ../dist/release-intent.json \
            --out ../dist/press-release-env.txt

          while IFS='=' read -r key value; do
            [[ -n "${key}" ]] || continue
            echo "${key}=${value}" >> "${GITHUB_OUTPUT}"
          done < ../dist/press-release-env.txt

      - name: Download Press system package
        run: |
          set -euo pipefail
          curl --fail-with-body --location --silent --show-error \
            --header "Authorization: Bearer ${PRESS_RELEASE_TOKEN}" \
            --output dist/press-system.zip \
            "${{ steps.release.outputs.asset_url }}"

      - name: Prepare demo worktree
        working-directory: source
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          bootstrap_remote_url() {
            printf 'https://x-access-token:%s@github.com/%s.git' "${GITHUB_TOKEN}" "${GITHUB_REPOSITORY}"
          }

          git fetch origin "${DEMO_BRANCH}" || true
          if git show-ref --verify --quiet "refs/remotes/origin/${DEMO_BRANCH}"; then
            git worktree add ../demo "origin/${DEMO_BRANCH}"
          else
            mkdir -p ../demo
            git -C ../demo init
            git -C ../demo remote add origin "$(bootstrap_remote_url)"
            git -C ../demo checkout --orphan "${DEMO_BRANCH}"
          fi

      - name: Sync demo site
        run: |
          set -euo pipefail
          bash source/scripts/sync-demo-from-press-release.sh \
            --demo-root demo \
            --theme-root source/theme \
            --archive dist/press-system.zip \
            --tag "${{ steps.release.outputs.tag }}" \
            --sha256 "${{ steps.release.outputs.asset_sha256 }}" \
            --size "${{ steps.release.outputs.asset_size }}"

      - name: Validate demo sync workflow
        working-directory: source
        run: |
          bash scripts/test-demo-sync-workflow.sh

      - name: Commit and push demo branch
        working-directory: demo
        env:
          SYNC_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Demo branch is already current with ${SYNC_TAG}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Sync demo site ${SYNC_TAG}"
          git pull --rebase origin "${DEMO_BRANCH}" || true
          git push origin "HEAD:${DEMO_BRANCH}"
