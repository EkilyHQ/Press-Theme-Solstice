name: Sync Demo From Press Release

on:
  repository_dispatch:
    types:
      - press-system-release
  workflow_dispatch:
    inputs:
      tag:
        description: Press release tag to sync, for example v3.4.0. Leave empty for latest.
        required: false
  schedule:
    - cron: '43 3 * * *'

permissions:
  contents: write

concurrency:
  group: sync-demo-from-press-release
  cancel-in-progress: false

jobs:
  sync-demo:
    runs-on: ubuntu-latest
    env:
      PRESS_REPOSITORY: ${{ vars.PRESS_REPOSITORY || 'EkilyHQ/Press' }}
      INPUT_TAG: ${{ inputs.tag }}
      DISPATCH_TAG: ${{ github.event.client_payload.tag }}
      DISPATCH_ASSET_NAME: ${{ github.event.client_payload.asset_name }}
      DISPATCH_ASSET_SIZE: ${{ github.event.client_payload.asset_size }}
      DISPATCH_ASSET_SHA256: ${{ github.event.client_payload.asset_sha256 }}
      DISPATCH_RELEASE_INTENT_SOURCE: ${{ github.event.client_payload.release_intent.source }}
      PRESS_RELEASE_TOKEN: ${{ secrets.PRESS_RELEASE_TOKEN || github.token }}
      THEME_RELEASE_TOKEN: ${{ secrets.THEME_RELEASE_TOKEN || github.token }}
      DEMO_BRANCH: demo
    steps:
      - name: Checkout theme source
        uses: actions/checkout@v6
        with:
          path: source
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.18.0'

      - name: Resolve Press release
        id: release
        working-directory: source
        env:
          GH_TOKEN: ${{ secrets.PRESS_RELEASE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          mkdir -p ../dist

          tag="${INPUT_TAG:-${DISPATCH_TAG:-}}"
          if [[ -n "${tag}" ]]; then
            gh api "repos/${PRESS_REPOSITORY}/releases/tags/${tag}" > ../dist/press-release.json
          else
            gh api "repos/${PRESS_REPOSITORY}/releases/latest" > ../dist/press-release.json
          fi

          release_tag="$(node -p "require('../dist/press-release.json').tag_name || ''")"
          payload_intent_source="${DISPATCH_RELEASE_INTENT_SOURCE:-}"
          canonical_intent_source=""
          if [[ -n "${release_tag}" ]]; then
            canonical_intent_source="https://raw.githubusercontent.com/${PRESS_REPOSITORY}/release-artifacts/${release_tag}/release-intent.json"
          fi
          if [[ -n "${payload_intent_source}" && "${payload_intent_source}" != "${canonical_intent_source}" ]]; then
            echo "dispatch release_intent.source must match ${canonical_intent_source}" >&2
            exit 1
          fi

          if [[ -n "${canonical_intent_source}" ]]; then
            if curl --fail-with-body --location --silent --show-error \
              --header "Authorization: Bearer ${PRESS_RELEASE_TOKEN}" \
              --output ../dist/release-intent.json \
              "${canonical_intent_source}"; then
              echo "Resolved Press release intent ${canonical_intent_source}."
            else
              rm -f ../dist/release-intent.json
              echo "canonical release intent ${canonical_intent_source} could not be fetched; legacy GitHub release metadata fallback has been sunset." >&2
              exit 1
            fi
          fi

          PRESS_TARGET_REPOSITORY="${GITHUB_REPOSITORY}" \
          PRESS_RELEASE_TARGET_CATEGORY="themeDemo" \
          PRESS_RELEASE_TARGET_REF="demo" \
          PRESS_RELEASE_TARGET_PATH="assets/press-system.json" \
          PRESS_RELEASE_TARGET_TYPE="press-system-manifest" \
          PRESS_RELEASE_TARGET_RECONCILER="theme-demo-runtime-sync" \
          node scripts/resolve-press-system-release.js \
            --release ../dist/press-release.json \
            --release-intent ../dist/release-intent.json \
            --out ../dist/press-release-env.txt

          while IFS='=' read -r key value; do
            [[ -n "${key}" ]] || continue
            echo "${key}=${value}" >> "${GITHUB_OUTPUT}"
          done < ../dist/press-release-env.txt

      - name: Resolve theme release
        id: theme
        working-directory: source
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('theme-release.json', 'utf8'));
          const asset = manifest.asset && typeof manifest.asset === 'object' ? manifest.asset : {};
          const release = manifest.release && typeof manifest.release === 'object' ? manifest.release : {};
          const slug = String(manifest.value || '').trim();
          const version = String(manifest.version || '').trim();
          const tag = String(release.tag || '').trim();
          const digest = String(asset.digest || '').trim().replace(/^sha256:/i, '').toLowerCase();
          if (manifest.schemaVersion !== 1 || manifest.type !== 'press-theme') {
            throw new Error('theme-release.json must be schemaVersion 1 and type press-theme');
          }
          if (!/^[a-z0-9][a-z0-9_-]{0,63}$/.test(slug)) {
            throw new Error('theme-release.json value must be a safe theme slug');
          }
          if (!version || tag !== `v${version}`) {
            throw new Error('theme-release.json must declare matching version and release.tag');
          }
          if (!asset.url || !asset.name || !(Number(asset.size) > 0) || !digest) {
            throw new Error('theme-release.json asset must declare url, name, size, and digest');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, [
            `slug=${slug}`,
            `version=${version}`,
            `tag=${tag}`,
            `asset_url=${asset.url}`,
            `asset_name=${asset.name}`,
            `asset_size=${Number(asset.size)}`,
            `asset_sha256=${digest}`,
            ''
          ].join('\n'));
          NODE

      - name: Download Press system package
        run: |
          set -euo pipefail
          curl --fail-with-body --location --silent --show-error \
            --header "Authorization: Bearer ${PRESS_RELEASE_TOKEN}" \
            --output dist/press-system.zip \
            "${{ steps.release.outputs.asset_url }}"

      - name: Download theme package
        run: |
          set -euo pipefail
          curl --fail-with-body --location --silent --show-error \
            --header "Authorization: Bearer ${THEME_RELEASE_TOKEN}" \
            --output dist/theme.zip \
            "${{ steps.theme.outputs.asset_url }}"

      - name: Prepare demo worktree
        working-directory: source
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          bootstrap_remote_url() {
            printf 'https://x-access-token:%s@github.com/%s.git' "${GITHUB_TOKEN}" "${GITHUB_REPOSITORY}"
          }

          git fetch origin "${DEMO_BRANCH}" || true
          if git show-ref --verify --quiet "refs/remotes/origin/${DEMO_BRANCH}"; then
            git worktree add ../demo "origin/${DEMO_BRANCH}"
          else
            mkdir -p ../demo
            git -C ../demo init
            git -C ../demo remote add origin "$(bootstrap_remote_url)"
            git -C ../demo checkout --orphan "${DEMO_BRANCH}"
          fi

      - name: Sync demo site
        run: |
          set -euo pipefail
          bash source/scripts/sync-demo-from-press-release.sh \
            --demo-root demo \
            --theme-archive dist/theme.zip \
            --theme-release-manifest source/theme-release.json \
            --archive dist/press-system.zip \
            --tag "${{ steps.release.outputs.tag }}" \
            --sha256 "${{ steps.release.outputs.asset_sha256 }}" \
            --size "${{ steps.release.outputs.asset_size }}"

      - name: Write Press system lock
        run: |
          set -euo pipefail
          node source/scripts/write-press-system-lock.js \
            --release-env dist/press-release-env.txt \
            --system-manifest demo/assets/press-system.json \
            --out demo/press-system-lock.json \
            --repository "${GITHUB_REPOSITORY}" \
            --category themeDemo \
            --ref demo \
            --path assets/press-system.json \
            --observed-type press-system-manifest \
            --reconciler theme-demo-runtime-sync

      - name: Write theme demo release lock
        run: |
          set -euo pipefail
          node source/scripts/write-theme-demo-release-lock.js \
            --press-lock demo/press-system-lock.json \
            --theme-release source/theme-release.json \
            --theme-manifest "demo/assets/themes/${{ steps.theme.outputs.slug }}/theme.json" \
            --packs demo/assets/themes/packs.json \
            --out demo/demo-release-lock.json \
            --repository "${GITHUB_REPOSITORY}" \
            --slug "${{ steps.theme.outputs.slug }}" \
            --ref demo

      - name: Validate demo sync workflow
        working-directory: source
        run: |
          bash scripts/test-demo-sync-workflow.sh

      - name: Commit and push demo branch
        working-directory: demo
        env:
          SYNC_TAG: ${{ steps.release.outputs.tag }}
          THEME_TAG: ${{ steps.theme.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Demo branch is already current with ${SYNC_TAG} and ${THEME_TAG}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Sync demo site ${SYNC_TAG} ${THEME_TAG}"
          git pull --rebase origin "${DEMO_BRANCH}" || true
          git push origin "HEAD:${DEMO_BRANCH}"
