name: Theme Release

on:
  push:
    branches:
      - main
    paths:
      - 'theme/**'
  workflow_dispatch:
    inputs:
      tag:
        description: Optional release tag, for example v3.5.0. Leave empty to bump patch.
        required: false

permissions:
  actions: write
  contents: write

concurrency:
  group: theme-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, 'Update theme release manifest')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      THEME_SLUG: solstice
      THEME_LABEL: Solstice
      REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
      PRESS_CONTRACT_CHECK_REF: v3.4.130
      PRESS_CONTRACT_LEGACY_JS_REF: v3.4.130
      PRESS_REPOSITORY: ${{ vars.PRESS_REPOSITORY || 'EkilyHQ/Press' }}
      PRESS_RELEASE_TOKEN: ${{ secrets.PRESS_RELEASE_TOKEN || github.token }}
    steps:
      - name: Checkout theme
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.18.0'

      - name: Plan release
        id: plan
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest_tag="$(gh release view --json tagName -q '.tagName' 2>/dev/null || true)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)"
          fi

          requested_tag="${REQUESTED_TAG:-}"
          if [[ -n "${requested_tag}" ]]; then
            next_tag="${requested_tag}"
          elif [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          else
            version="$(node -p "require('./theme/theme.json').version || '0.0.1'")"
            next_tag="v${version}"
          fi

          if [[ ! "${next_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must be vMAJOR.MINOR.PATCH" >&2
            exit 2
          fi

          if [[ -z "${requested_tag}" && -n "${latest_tag}" ]]; then
            changed_files="$(git diff --name-only "${latest_tag}..HEAD" -- theme)"
            if [[ -z "${changed_files}" ]]; then
              {
                echo "should_release=false"
                echo "latest_tag=${latest_tag}"
              } >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          if gh release view "${next_tag}" >/dev/null 2>&1; then
            echo "release ${next_tag} already exists" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${next_tag}" >/dev/null 2>&1; then
            echo "remote tag ${next_tag} already exists" >&2
            exit 1
          fi

          {
            echo "should_release=true"
            echo "latest_tag=${latest_tag}"
            echo "next_tag=${next_tag}"
            echo "version=${next_tag#v}"
          } >> "${GITHUB_OUTPUT}"

      - name: Prepare release version
        if: steps.plan.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          version="${{ steps.plan.outputs.version }}"
          node <<'NODE'
          const fs = require('fs');
          const path = 'theme/theme.json';
          const version = process.env.VERSION;
          const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
          manifest.version = version;
          fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
        env:
          VERSION: ${{ steps.plan.outputs.version }}

      - name: Checkout Press checks
        if: steps.plan.outputs.should_release == 'true'
        uses: actions/checkout@v6
        with:
          repository: EkilyHQ/Press
          ref: ${{ env.PRESS_CONTRACT_CHECK_REF }}
          path: .press

      - name: Validate theme contract
        if: steps.plan.outputs.should_release == 'true'
        env:
          PRESS_ROOT: .press
        run: |
          set -euo pipefail
          node scripts/test-public-chrome-features.mjs
          rm -rf ".press/assets/themes/${THEME_SLUG}"
          mkdir -p ".press/assets/themes/${THEME_SLUG}"
          rsync -a ./theme/ ".press/assets/themes/${THEME_SLUG}/"
          cd .press
          contract_test="scripts/test-theme-contracts.mjs"
          if [[ ! -f "${contract_test}" ]]; then
            if [[ "${PRESS_CONTRACT_CHECK_REF}" != "${PRESS_CONTRACT_LEGACY_JS_REF}" ]]; then
              echo "Press ${PRESS_CONTRACT_CHECK_REF} must provide ${contract_test}; the .js fallback is limited to ${PRESS_CONTRACT_LEGACY_JS_REF}" >&2
              exit 1
            fi
            contract_test="scripts/test-theme-contracts.js"
          fi
          node "${contract_test}"

      - name: Package theme
        if: steps.plan.outputs.should_release == 'true'
        id: package
        run: |
          set -euo pipefail
          tag="${{ steps.plan.outputs.next_tag }}"
          version="${{ steps.plan.outputs.version }}"
          asset="press-theme-${THEME_SLUG}-${tag}.zip"
          mkdir -p dist "press-theme-${THEME_SLUG}"
          rsync -a ./theme/ "press-theme-${THEME_SLUG}/"
          find "press-theme-${THEME_SLUG}" -type f | sort | sed "s#^press-theme-${THEME_SLUG}/##" > dist/files.txt
          zip -qr "dist/${asset}" "press-theme-${THEME_SLUG}"
          size="$(wc -c < "dist/${asset}" | tr -d ' ')"
          digest="$(sha256sum "dist/${asset}" | awk '{print $1}')"
          {
            echo "version=${version}"
            echo "asset=${asset}"
            echo "path=dist/${asset}"
            echo "size=${size}"
            echo "digest=${digest}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish fetchable artifact
        if: steps.plan.outputs.should_release == 'true'
        id: artifact
        run: |
          set -euo pipefail
          tag="${{ steps.plan.outputs.next_tag }}"
          asset="${{ steps.package.outputs.asset }}"
          artifact_branch="release-artifacts"
          artifact_path="${tag}/${asset}"
          artifact_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${artifact_branch}/${artifact_path}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${artifact_branch}" || true
          rm -rf artifacts-worktree
          if git show-ref --verify --quiet "refs/remotes/origin/${artifact_branch}"; then
            git worktree add artifacts-worktree "origin/${artifact_branch}"
          else
            git worktree add --detach artifacts-worktree
            git -C artifacts-worktree checkout --orphan "${artifact_branch}"
            git -C artifacts-worktree rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "artifacts-worktree/${tag}"
          cp "${{ steps.package.outputs.path }}" "artifacts-worktree/${artifact_path}"
          git -C artifacts-worktree add "${artifact_path}"
          if git -C artifacts-worktree diff --cached --quiet; then
            echo "Artifact ${artifact_path} is already published."
          else
            git -C artifacts-worktree commit -m "Publish ${asset}"
            git -C artifacts-worktree push origin "HEAD:${artifact_branch}"
          fi
          git worktree remove artifacts-worktree --force
          echo "url=${artifact_url}" >> "${GITHUB_OUTPUT}"

      - name: Update release manifest
        if: steps.plan.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          tag="${{ steps.plan.outputs.next_tag }}"
          slug="${THEME_SLUG}"
          label="${THEME_LABEL}"
          version="${{ steps.package.outputs.version }}"
          asset="${{ steps.package.outputs.asset }}"
          asset_url="${{ steps.artifact.outputs.url }}"
          size="${{ steps.package.outputs.size }}"
          digest="${{ steps.package.outputs.digest }}"
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          export repo tag slug label version asset asset_url size digest published_at
          node <<'NODE'
          const fs = require('fs');
          const repo = process.env.repo;
          const tag = process.env.tag;
          const slug = process.env.slug;
          const label = process.env.label;
          const version = process.env.version;
          const asset = process.env.asset;
          const assetUrl = process.env.asset_url;
          const size = Number(process.env.size || 0);
          const digest = process.env.digest;
          const publishedAt = process.env.published_at;
          const files = fs.readFileSync('dist/files.txt', 'utf8').split(/\r?\n/).filter(Boolean);
          const themeManifest = JSON.parse(fs.readFileSync('theme/theme.json', 'utf8'));
          const engines = themeManifest.engines && typeof themeManifest.engines === 'object'
            ? themeManifest.engines
            : {};
          const manifest = {
            schemaVersion: 1,
            type: 'press-theme',
            value: slug,
            label,
            version,
            contractVersion: Number(themeManifest.contractVersion || 1),
            engines,
            release: {
              tag,
              htmlUrl: `https://github.com/${repo}/releases/tag/${tag}`,
              publishedAt,
              notes: ''
            },
            asset: {
              name: asset,
              url: assetUrl,
              size,
              digest: `sha256:${digest}`
            },
            files
          };
          fs.writeFileSync('theme-release.json', `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Commit release metadata
        if: steps.plan.outputs.should_release == 'true'
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add theme/theme.json theme-release.json
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
          else
            git commit -m "Update theme release manifest ${{ steps.plan.outputs.next_tag }}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        if: steps.plan.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.plan.outputs.next_tag }}"
          asset="${{ steps.package.outputs.path }}"
          target="${{ steps.commit.outputs.sha }}"
          gh release create "${tag}" "${asset}" \
            --target "${target}" \
            --title "${tag}" \
            --notes "Theme release ${tag}"

      - name: Refresh demo site
        if: steps.plan.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          press_tag="$(GH_TOKEN="${PRESS_RELEASE_TOKEN}" gh api "repos/${PRESS_REPOSITORY}/releases/latest" --jq '.tag_name')"
          if [[ -z "${press_tag}" ]]; then
            echo "Unable to resolve latest Press release tag." >&2
            exit 1
          fi
          gh workflow run .github/workflows/sync-demo-from-press-release.yml \
            --ref "${GITHUB_REF_NAME}" \
            -f tag="${press_tag}"
