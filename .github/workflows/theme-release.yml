name: Theme Release

on:
  push:
    branches:
      - main
    paths:
      - 'theme/**'
  workflow_dispatch:
    inputs:
      tag:
        description: Optional release tag, for example v3.5.0. Leave empty to bump patch.
        required: false

permissions:
  contents: write

concurrency:
  group: theme-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, 'Update theme release manifest')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      THEME_SLUG: solstice
      THEME_LABEL: Solstice
      REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
    steps:
      - name: Checkout theme
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Plan release
        id: plan
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest_tag="$(gh release view --json tagName -q '.tagName' 2>/dev/null || true)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)"
          fi

          requested_tag="${REQUESTED_TAG:-}"
          if [[ -n "${requested_tag}" ]]; then
            next_tag="${requested_tag}"
          elif [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          else
            version="$(node -p "require('./theme/theme.json').version || '0.0.1'")"
            next_tag="v${version}"
          fi

          if [[ ! "${next_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must be vMAJOR.MINOR.PATCH" >&2
            exit 2
          fi

          if [[ -z "${requested_tag}" && -n "${latest_tag}" ]]; then
            changed_files="$(git diff --name-only "${latest_tag}..HEAD" -- theme)"
            if [[ -z "${changed_files}" ]]; then
              {
                echo "should_release=false"
                echo "latest_tag=${latest_tag}"
              } >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          if gh release view "${next_tag}" >/dev/null 2>&1; then
            echo "release ${next_tag} already exists" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${next_tag}" >/dev/null 2>&1; then
            echo "remote tag ${next_tag} already exists" >&2
            exit 1
          fi

          {
            echo "should_release=true"
            echo "latest_tag=${latest_tag}"
            echo "next_tag=${next_tag}"
            echo "version=${next_tag#v}"
          } >> "${GITHUB_OUTPUT}"

      - name: Prepare release version
        if: steps.plan.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          version="${{ steps.plan.outputs.version }}"
          node <<'NODE'
          const fs = require('fs');
          const path = 'theme/theme.json';
          const version = process.env.VERSION;
          const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
          manifest.version = version;
          fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
        env:
          VERSION: ${{ steps.plan.outputs.version }}

      - name: Checkout Press checks
        if: steps.plan.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          repository: EkilyHQ/Press
          path: .press

      - name: Validate theme contract
        if: steps.plan.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          rm -rf ".press/assets/themes/${THEME_SLUG}"
          mkdir -p ".press/assets/themes/${THEME_SLUG}"
          rsync -a ./theme/ ".press/assets/themes/${THEME_SLUG}/"
          cd .press
          node --experimental-default-type=module scripts/test-theme-contracts.js

      - name: Package theme
        if: steps.plan.outputs.should_release == 'true'
        id: package
        run: |
          set -euo pipefail
          tag="${{ steps.plan.outputs.next_tag }}"
          version="${{ steps.plan.outputs.version }}"
          asset="press-theme-${THEME_SLUG}-${tag}.zip"
          mkdir -p dist "press-theme-${THEME_SLUG}"
          rsync -a ./theme/ "press-theme-${THEME_SLUG}/"
          find "press-theme-${THEME_SLUG}" -type f | sort | sed "s#^press-theme-${THEME_SLUG}/##" > dist/files.txt
          zip -qr "dist/${asset}" "press-theme-${THEME_SLUG}"
          size="$(wc -c < "dist/${asset}" | tr -d ' ')"
          digest="$(sha256sum "dist/${asset}" | awk '{print $1}')"
          {
            echo "version=${version}"
            echo "asset=${asset}"
            echo "path=dist/${asset}"
            echo "size=${size}"
            echo "digest=${digest}"
          } >> "${GITHUB_OUTPUT}"

      - name: Update release manifest
        if: steps.plan.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          tag="${{ steps.plan.outputs.next_tag }}"
          slug="${THEME_SLUG}"
          label="${THEME_LABEL}"
          version="${{ steps.package.outputs.version }}"
          asset="${{ steps.package.outputs.asset }}"
          size="${{ steps.package.outputs.size }}"
          digest="${{ steps.package.outputs.digest }}"
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          export repo tag slug label version asset size digest published_at
          node <<'NODE'
          const fs = require('fs');
          const repo = process.env.repo;
          const tag = process.env.tag;
          const slug = process.env.slug;
          const label = process.env.label;
          const version = process.env.version;
          const asset = process.env.asset;
          const size = Number(process.env.size || 0);
          const digest = process.env.digest;
          const publishedAt = process.env.published_at;
          const files = fs.readFileSync('dist/files.txt', 'utf8').split(/\r?\n/).filter(Boolean);
          const manifest = {
            schemaVersion: 1,
            type: 'press-theme',
            value: slug,
            label,
            version,
            contractVersion: 1,
            release: {
              tag,
              htmlUrl: `https://github.com/${repo}/releases/tag/${tag}`,
              publishedAt,
              notes: ''
            },
            asset: {
              name: asset,
              url: `https://github.com/${repo}/releases/download/${tag}/${asset}`,
              size,
              digest: `sha256:${digest}`
            },
            files
          };
          fs.writeFileSync('theme-release.json', `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Commit release metadata
        if: steps.plan.outputs.should_release == 'true'
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add theme/theme.json theme-release.json
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
          else
            git commit -m "Update theme release manifest ${{ steps.plan.outputs.next_tag }}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        if: steps.plan.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.plan.outputs.next_tag }}"
          asset="${{ steps.package.outputs.path }}"
          target="${{ steps.commit.outputs.sha }}"
          gh release create "${tag}" "${asset}" \
            --target "${target}" \
            --title "${tag}" \
            --notes "Theme release ${tag}"
