name: Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Sync Demo From Press Release
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout demo site
        uses: actions/checkout@v6
        with:
          ref: demo

      - name: Build Pages artifact
        run: |
          set -euo pipefail
          site_dir="dist/pages"
          rm -rf "${site_dir}"
          mkdir -p "${site_dir}"

          while IFS= read -r -d '' file; do
            mkdir -p "${site_dir}/$(dirname "${file}")"
            cp "${file}" "${site_dir}/${file}"
          done < <(git ls-files -z -- .nojekyll index.html index_editor.html index_editor_preview.html site.yaml assets wwwroot)

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
